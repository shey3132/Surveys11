<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תצוגת סקר חי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0a1f;
    --bg-mid:#171335;
    --ink:#f5f3ff;
    --muted:#a29fcf;
    --pink:#ff3d81;
    --cyan:#00e5c7;
    --gold:#ffc93c;
    --card:rgba(23,19,53,0.78);
    --card-line:rgba(255,255,255,0.14);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    overflow:hidden;
    background:
      radial-gradient(ellipse 900px 700px at 15% -5%, rgba(255,61,129,0.28), transparent 60%),
      radial-gradient(ellipse 900px 700px at 85% 105%, rgba(0,229,199,0.24), transparent 60%),
      var(--bg-deep);
    color:var(--ink);
    font-family:'Rubik', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  /* slow shifting aurora blob behind everything */
  .aurora{
    position:fixed; inset:-20%;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,61,129,0.35), transparent 45%),
      radial-gradient(circle at 70% 70%, rgba(0,229,199,0.3), transparent 45%),
      radial-gradient(circle at 50% 15%, rgba(255,201,60,0.18), transparent 40%);
    filter:blur(60px);
    animation:drift 22s ease-in-out infinite alternate;
    z-index:0;
  }
  @keyframes drift{
    0%{transform:translate(-3%,-2%) rotate(0deg) scale(1);}
    100%{transform:translate(3%,3%) rotate(8deg) scale(1.08);}
  }

  /* continuously rising confetti particles, ambient motion */
  .particle-field{ position:fixed; inset:0; overflow:hidden; z-index:1; pointer-events:none; }
  .drift-particle{
    position:absolute; bottom:-5%;
    border-radius:3px;
    opacity:0.55;
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.6; }
    90%{ opacity:0.5; }
    100%{ transform:translateY(-115vh) rotate(300deg); opacity:0; }
  }

  .stage{
    position:relative; z-index:2;
    width:100%; max-width:min(94vw, 1700px);
    padding:40px 32px;
    text-align:center;
    transform-origin:center center;
    transition:transform .25s ease;
  }

  /* ---- idle ---- */
  .idle-wrap{ display:flex; flex-direction:column; align-items:center; gap:32px; }
  .idle-ring{
    position:relative; width:220px; height:220px;
    display:flex; align-items:center; justify-content:center;
  }
  .idle-ring .core{
    width:140px; height:140px; border-radius:50%;
    background:linear-gradient(135deg, var(--pink), var(--cyan));
    display:flex; align-items:center; justify-content:center;
    font-size:64px;
    box-shadow:0 0 70px rgba(255,61,129,0.5);
  }
  .idle-ring .pulse-ring{
    position:absolute; inset:0; border-radius:50%;
    border:3px solid rgba(255,61,129,0.5);
    animation:pulseRing 2.4s ease-out infinite;
  }
  .idle-ring .pulse-ring.delay{ animation-delay:1.2s; }
  @keyframes pulseRing{
    0%{ transform:scale(0.6); opacity:0.9; }
    100%{ transform:scale(1.9); opacity:0; }
  }
  .idle-text{ font-size:clamp(28px, 3.2vw, 44px); color:var(--muted); font-weight:500; }

  /* ---- active ---- */
  .eyebrow{
    display:inline-flex; align-items:center; gap:14px;
    background:var(--card); border:1px solid var(--card-line);
    padding:14px 32px; border-radius:50px;
    font-size:clamp(18px, 1.8vw, 26px); letter-spacing:0.5px; color:var(--ink);
    margin-bottom:36px;
  }
  .live-dot{
    width:14px; height:14px; border-radius:50%;
    background:var(--pink);
    box-shadow:0 0 0 0 rgba(255,61,129,0.6);
    animation:livePulse 1.5s infinite;
  }
  @keyframes livePulse{
    0%{ box-shadow:0 0 0 0 rgba(255,61,129,0.55); }
    70%{ box-shadow:0 0 0 12px rgba(255,61,129,0); }
    100%{ box-shadow:0 0 0 0 rgba(255,61,129,0); }
  }

  h1.question{
    font-family:'Suez One', serif;
    font-weight:400;
    font-size:clamp(42px, 6vw, 88px);
    line-height:1.25;
    margin:0 0 52px;
    text-shadow:0 0 50px rgba(255,61,129,0.28);
  }

  .options{
    display:grid; gap:22px;
    max-width:min(90vw, 1400px); margin:0 auto 56px;
  }
  .option{
    display:flex; align-items:center; gap:26px;
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:22px;
    padding:28px 40px;
    font-size:clamp(24px, 2.8vw, 38px);
    font-weight:500;
    text-align:right;
    backdrop-filter:blur(6px);
  }
  .option .digit{
    flex-shrink:0;
    width:76px; height:76px;
    border-radius:20px;
    background:linear-gradient(145deg, var(--pink), #ff7ab0);
    color:#1a0b14;
    font-weight:900; font-size:34px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 20px rgba(255,61,129,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .option:nth-child(2) .digit{ background:linear-gradient(145deg, var(--cyan), #7ffff0); box-shadow:0 6px 20px rgba(0,229,199,0.35), inset 0 1px 0 rgba(255,255,255,0.4); }
  .option:nth-child(3) .digit{ background:linear-gradient(145deg, var(--gold), #ffe28a); box-shadow:0 4px 14px rgba(255,201,60,0.35), inset 0 1px 0 rgba(255,255,255,0.4); }

  .counter-wrap{ display:flex; justify-content:center; }
  .counter{
    position:relative;
    display:inline-flex; flex-direction:column; align-items:center; gap:6px;
    background:var(--card); border:1px solid var(--card-line);
    padding:36px 96px; border-radius:32px;
    backdrop-filter:blur(6px);
  }
  .counter .num{
    font-size:clamp(70px,10vw,130px); font-weight:900;
    background:linear-gradient(135deg, var(--pink), var(--gold), var(--cyan));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    font-variant-numeric:tabular-nums;
    transition:transform .18s;
  }
  .counter .num.bump{ transform:scale(1.22); }
  .counter .lbl{ font-size:clamp(18px,1.7vw,26px); color:var(--muted); letter-spacing:0.5px; }

  /* confetti burst on vote increment */
  .burst-particle{
    position:absolute; top:50%; left:50%;
    width:8px; height:8px; border-radius:2px;
    pointer-events:none;
    animation:burst 900ms ease-out forwards;
  }
  @keyframes burst{
    0%{ transform:translate(-50%,-50%) rotate(0deg) scale(1); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--bx)), calc(-50% + var(--by))) rotate(var(--br)) scale(0.3); opacity:0; }
  }

  /* ---- closed / results ---- */
  .trophy{ font-size:88px; margin-bottom:10px; filter:drop-shadow(0 0 34px rgba(255,201,60,0.5)); }
  .results-title{
    font-family:'Suez One', serif; font-weight:400;
    font-size:clamp(38px,5.4vw,68px);
    margin:0 0 10px;
  }
  .results-sub{ color:var(--muted); font-size:clamp(20px,1.9vw,28px); margin-bottom:52px; }
  .result-block{ max-width:min(90vw, 1400px); margin:0 auto 44px; text-align:right; }
  .result-block h3{
    font-size:clamp(24px,2.2vw,32px); font-weight:700; margin:0 0 22px;
    display:flex; align-items:center; gap:12px;
  }
  .rbar-row{ display:flex; align-items:center; gap:20px; margin-bottom:18px; }
  .rbar-label{ width:min(28vw,320px); flex-shrink:0; font-size:clamp(18px,1.8vw,26px); font-weight:500; display:flex; align-items:center; gap:8px; }
  .lb-medal{ font-size:1.15em; font-weight:900; min-width:1.4em; display:inline-block; text-align:center; }
  .rbar-track{ flex:1; height:40px; background:rgba(10,9,26,0.75); border-radius:20px; overflow:hidden; border:1px solid var(--card-line); backdrop-filter:blur(6px); }
  .rbar-fill{ height:100%; border-radius:20px; background:linear-gradient(90deg, var(--pink), var(--gold)); transition:width 1s cubic-bezier(.2,.9,.2,1); }
  .rbar-fill.leader{ background:linear-gradient(90deg, var(--gold), #fff3cf); box-shadow:0 0 22px rgba(255,201,60,0.6); }
  .rbar-pct{ width:90px; flex-shrink:0; text-align:left; font-weight:800; font-size:clamp(18px,1.8vw,26px); color:var(--gold); }

  /* result cards — one per option/contestant, percentage front and center */
  .result-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:24px;
  }
  .result-card{
    position:relative;
    overflow:hidden;
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:26px;
    padding:clamp(24px,3vw,44px) clamp(18px,2.4vw,28px);
    backdrop-filter:blur(6px);
    transition:transform .4s ease, box-shadow .4s ease, border-color .4s ease, background .4s ease;
  }
  .result-card > *{ position:relative; z-index:1; }
  .card-fill{
    position:absolute; left:0; right:0; bottom:0; z-index:0;
    height:0%;
    background:linear-gradient(180deg, rgba(255,61,129,0.4), rgba(0,229,199,0.22));
    transition:height 1.5s cubic-bezier(.16,.85,.2,1), background .4s ease;
  }
  .result-card.leader .card-fill{
    background:linear-gradient(180deg, rgba(255,201,60,0.5), rgba(255,201,60,0.16));
  }
  .result-card.leader{
    border-color:var(--gold);
    background:linear-gradient(160deg, rgba(255,201,60,0.16), var(--card));
    box-shadow:0 0 46px rgba(255,201,60,0.35);
    transform:scale(1.06);
  }
  .card-crown{
    font-size:clamp(30px,3.4vw,44px);
    margin-bottom:6px;
    filter:drop-shadow(0 0 18px rgba(255,201,60,0.6));
    animation:crownPop .55s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes crownPop{
    0%{ transform:scale(0) rotate(-20deg); opacity:0; }
    65%{ transform:scale(1.25) rotate(10deg); opacity:1; }
    100%{ transform:scale(1) rotate(0deg); opacity:1; }
  }
  .card-name{
    font-size:clamp(19px,2vw,27px);
    font-weight:700;
    margin-bottom:16px;
  }
  .card-percent{
    font-size:clamp(46px,6.4vw,88px);
    font-weight:900;
    line-height:1;
    margin-bottom:10px;
    background:linear-gradient(135deg, var(--pink), var(--cyan));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .result-card.leader .card-percent{
    background:linear-gradient(135deg, var(--gold), #fff3cf);
    -webkit-background-clip:text; background-clip:text;
  }
  .card-count{
    color:var(--muted);
    font-size:clamp(14px,1.3vw,19px);
  }

  .fade-in{ animation:fadeIn .5s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<div class="aurora"></div>
<div class="particle-field" id="particleField"></div>

<div class="stage" id="stage">
  <div class="idle-wrap">
    <div class="idle-ring">
      <span class="pulse-ring"></span>
      <span class="pulse-ring delay"></span>
      <span class="core">☎️</span>
    </div>
    <div class="idle-text">ממתינים לסקר הבא…</div>
  </div>
</div>

<script>
const API = '';
const stage = document.getElementById('stage');
let lastCount = null;
let lastStatus = null;

const PALETTE = ['#ff3d81', '#00e5c7', '#ffc93c', '#7ffff0', '#ff7ab0'];

// ---------- ambient rising particles (continuous festive motion) ----------
function initAmbientParticles(){
  const field = document.getElementById('particleField');
  const count = 26;
  for (let i = 0; i < count; i++){
    const p = document.createElement('div');
    p.className = 'drift-particle';
    const size = 4 + Math.random() * 8;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    p.style.animationDuration = (14 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 20) + 's';
    field.appendChild(p);
  }
}
initAmbientParticles();

// ---------- confetti burst when the vote counter increments ----------
function burstConfetti(container){
  for (let i = 0; i < 18; i++){
    const p = document.createElement('div');
    p.className = 'burst-particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 90;
    p.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--by', Math.sin(angle) * dist + 'px');
    p.style.setProperty('--br', (Math.random() * 360) + 'deg');
    p.style.background = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    container.appendChild(p);
    setTimeout(() => p.remove(), 950);
  }
}

async function poll(){
  try{
    const res = await fetch(API + '/display/status');
    const data = await res.json();
    render(data);
  }catch(err){ /* keep last rendered state on transient network errors */ }
}

function render(data){
  if (data.status === 'idle'){
    if (lastStatus !== 'idle'){
      stage.innerHTML = `
        <div class="idle-wrap fade-in">
          <div class="idle-ring">
            <span class="pulse-ring"></span>
            <span class="pulse-ring delay"></span>
            <span class="core">☎️</span>
          </div>
          <div class="idle-text">ממתינים לסקר הבא…</div>
        </div>
      `;
      fitStage();
    }
    lastStatus = 'idle'; lastCount = null;
    return;
  }

  if (data.status === 'active'){
    const bump = lastCount !== null && data.response_count !== lastCount;
    const optionsHtml = (data.options || []).map(o => `
      <div class="option">
        <span class="digit">${o.digit}</span>
        <span>${escapeHtml(o.text)}</span>
      </div>
    `).join('');

    stage.innerHTML = `
      <div class="eyebrow fade-in"><span class="live-dot"></span> הצבעה פעילה · ${escapeHtml(data.survey_title || '')}</div>
      <h1 class="question fade-in">${escapeHtml(data.question || '')}</h1>
      <div class="options">${optionsHtml}</div>
      <div class="counter-wrap">
        <div class="counter" id="counterBox">
          <span class="num ${bump ? 'bump' : ''}" id="countNum">${data.response_count}</span>
          <span class="lbl">משיבים עד כה</span>
        </div>
      </div>
    `;
    fitStage();
    if (bump){
      const box = document.getElementById('counterBox');
      burstConfetti(box);
      setTimeout(() => {
        const el = document.getElementById('countNum');
        if (el) el.classList.remove('bump');
      }, 220);
    }
    lastCount = data.response_count;
    lastStatus = 'active';
    return;
  }

  if (data.status === 'closed'){
    if (lastStatus !== 'closed'){
      const blocks = (data.results || []).map(q => {
        return `
          <div class="result-block">
            <h3>${escapeHtml(q.question)}</h3>
            <div class="result-cards">
              ${q.options.map(o => `
                <div class="result-card" data-percent="${o.percent}" data-count="${o.count}">
                  <div class="card-fill"></div>
                  <div class="card-name">${escapeHtml(o.text)}</div>
                  <div class="card-percent"><span class="card-percent-num">0</span>%</div>
                  <div class="card-count"><span class="card-count-num">0</span> קולות</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');

      const isContest = data.survey_type === 'contest';
      stage.innerHTML = `
        <div class="trophy fade-in">🏆</div>
        <div class="results-title fade-in">${isContest ? 'יש לנו מנצח!' : 'התוצאות הסופיות'}</div>
        <div class="results-sub">${escapeHtml(data.survey_title || '')}</div>
        ${blocks}
      `;
      fitStage();
      animateResultCards();
    }
    lastStatus = 'closed';
    return;
  }
}

// Reveals results with a "filling up" effect instead of snapping straight to the
// final numbers: each card's liquid-style fill rises from empty to its real
// percentage while the percent/count numbers count up in sync, staggered
// slightly card-by-card for a cascading, suspenseful reveal. The winner isn't
// shown up front (no gold styling, no crown, no rank-sorted position) — it's
// only "crowned" once every card in its block has finished counting, so
// there's still real suspense in watching it play out.
function animateResultCards(){
  stage.querySelectorAll('.result-block').forEach(block => {
    const cards = Array.from(block.querySelectorAll('.result-card'));
    let remaining = cards.length;
    let leaderCard = null;
    let leaderPercent = -1;

    cards.forEach((card, i) => {
      const targetPercent = parseFloat(card.dataset.percent) || 0;
      const targetCount = parseInt(card.dataset.count, 10) || 0;
      if (targetPercent > leaderPercent) {
        leaderPercent = targetPercent;
        leaderCard = card;
      }
      const fill = card.querySelector('.card-fill');
      const percentEl = card.querySelector('.card-percent-num');
      const countEl = card.querySelector('.card-count-num');
      const delay = i * 180;

      setTimeout(() => {
        requestAnimationFrame(() => {
          if (fill) fill.style.height = targetPercent + '%';
        });
        const duration = 1400;
        const start = performance.now();
        function tick(now){
          const t = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - t, 3); // ease-out — fast start, gentle settle
          if (percentEl) percentEl.textContent = Math.round(targetPercent * eased);
          if (countEl) countEl.textContent = Math.round(targetCount * eased);
          if (t < 1){
            requestAnimationFrame(tick);
          } else {
            remaining -= 1;
            if (remaining === 0) revealLeader();
          }
        }
        requestAnimationFrame(tick);
      }, delay);
    });

    function revealLeader(){
      if (!leaderCard || leaderPercent <= 0) return;
      setTimeout(() => {
        leaderCard.classList.add('leader');
        const crown = document.createElement('div');
        crown.className = 'card-crown';
        crown.textContent = '👑';
        const fillEl = leaderCard.querySelector('.card-fill');
        fillEl.insertAdjacentElement('afterend', crown);
      }, 350);
    }
  });
}

// If the rendered content is taller than the screen, shrink the whole stage
// (uniformly, via CSS transform) until it fits — this is what keeps the
// respondent counter (or anything else) from being pushed off-screen when a
// survey has more questions/options than usual. No scrolling is possible on
// an unattended big-screen display, so everything must always fit as-is.
function fitStage(){
  requestAnimationFrame(() => {
    stage.style.transform = 'scale(1)';
    // Read natural size on the next frame, after the reset above has applied.
    requestAnimationFrame(() => {
      const available = window.innerHeight * 0.94;
      const needed = stage.scrollHeight;
      if (needed > available){
        const scale = Math.max(0.45, available / needed);
        stage.style.transform = `scale(${scale})`;
      }
    });
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

window.addEventListener('resize', fitStage);

poll();
setInterval(poll, 2000);
</script>

</body>
</html>
