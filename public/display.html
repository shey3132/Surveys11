<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תצוגת סקר חי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0a1f;
    --bg-mid:#171335;
    --ink:#f5f3ff;
    --muted:#a29fcf;
    --pink:#ff3d81;
    --cyan:#00e5c7;
    --gold:#ffc93c;
    --card:rgba(255,255,255,0.06);
    --card-line:rgba(255,255,255,0.12);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    overflow:hidden;
    background:
      radial-gradient(ellipse 900px 700px at 15% -5%, rgba(255,61,129,0.28), transparent 60%),
      radial-gradient(ellipse 900px 700px at 85% 105%, rgba(0,229,199,0.24), transparent 60%),
      var(--bg-deep);
    color:var(--ink);
    font-family:'Rubik', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  /* slow shifting aurora blob behind everything */
  .aurora{
    position:fixed; inset:-20%;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,61,129,0.35), transparent 45%),
      radial-gradient(circle at 70% 70%, rgba(0,229,199,0.3), transparent 45%),
      radial-gradient(circle at 50% 15%, rgba(255,201,60,0.18), transparent 40%);
    filter:blur(60px);
    animation:drift 22s ease-in-out infinite alternate;
    z-index:0;
  }
  @keyframes drift{
    0%{transform:translate(-3%,-2%) rotate(0deg) scale(1);}
    100%{transform:translate(3%,3%) rotate(8deg) scale(1.08);}
  }

  /* continuously rising confetti particles, ambient motion */
  .particle-field{ position:fixed; inset:0; overflow:hidden; z-index:1; pointer-events:none; }
  .drift-particle{
    position:absolute; bottom:-5%;
    border-radius:3px;
    opacity:0.55;
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.6; }
    90%{ opacity:0.5; }
    100%{ transform:translateY(-115vh) rotate(300deg); opacity:0; }
  }

  .stage{
    position:relative; z-index:2;
    width:100%; max-width:1100px;
    padding:40px 32px;
    text-align:center;
  }

  /* ---- idle ---- */
  .idle-wrap{ display:flex; flex-direction:column; align-items:center; gap:22px; }
  .idle-ring{
    position:relative; width:130px; height:130px;
    display:flex; align-items:center; justify-content:center;
  }
  .idle-ring .core{
    width:78px; height:78px; border-radius:50%;
    background:linear-gradient(135deg, var(--pink), var(--cyan));
    display:flex; align-items:center; justify-content:center;
    font-size:34px;
    box-shadow:0 0 40px rgba(255,61,129,0.45);
  }
  .idle-ring .pulse-ring{
    position:absolute; inset:0; border-radius:50%;
    border:2px solid rgba(255,61,129,0.5);
    animation:pulseRing 2.4s ease-out infinite;
  }
  .idle-ring .pulse-ring.delay{ animation-delay:1.2s; }
  @keyframes pulseRing{
    0%{ transform:scale(0.6); opacity:0.9; }
    100%{ transform:scale(1.9); opacity:0; }
  }
  .idle-text{ font-size:26px; color:var(--muted); font-weight:500; }

  /* ---- active ---- */
  .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--card-line);
    padding:8px 20px; border-radius:40px;
    font-size:16px; letter-spacing:0.5px; color:var(--ink);
    margin-bottom:28px;
  }
  .live-dot{
    width:10px; height:10px; border-radius:50%;
    background:var(--pink);
    box-shadow:0 0 0 0 rgba(255,61,129,0.6);
    animation:livePulse 1.5s infinite;
  }
  @keyframes livePulse{
    0%{ box-shadow:0 0 0 0 rgba(255,61,129,0.55); }
    70%{ box-shadow:0 0 0 12px rgba(255,61,129,0); }
    100%{ box-shadow:0 0 0 0 rgba(255,61,129,0); }
  }

  h1.question{
    font-family:'Suez One', serif;
    font-weight:400;
    font-size:clamp(30px, 4.6vw, 56px);
    line-height:1.3;
    margin:0 0 40px;
    text-shadow:0 0 40px rgba(255,61,129,0.25);
  }

  .options{
    display:grid; gap:16px;
    max-width:820px; margin:0 auto 44px;
  }
  .option{
    display:flex; align-items:center; gap:18px;
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:16px;
    padding:18px 26px;
    font-size:clamp(18px, 2.1vw, 25px);
    font-weight:500;
    text-align:right;
    backdrop-filter:blur(6px);
  }
  .option .digit{
    flex-shrink:0;
    width:52px; height:52px;
    border-radius:14px;
    background:linear-gradient(145deg, var(--pink), #ff7ab0);
    color:#1a0b14;
    font-weight:900; font-size:22px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(255,61,129,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .option:nth-child(2) .digit{ background:linear-gradient(145deg, var(--cyan), #7ffff0); box-shadow:0 4px 14px rgba(0,229,199,0.35), inset 0 1px 0 rgba(255,255,255,0.4); }
  .option:nth-child(3) .digit{ background:linear-gradient(145deg, var(--gold), #ffe28a); box-shadow:0 4px 14px rgba(255,201,60,0.35), inset 0 1px 0 rgba(255,255,255,0.4); }

  .counter-wrap{ display:flex; justify-content:center; }
  .counter{
    position:relative;
    display:inline-flex; flex-direction:column; align-items:center; gap:2px;
    background:var(--card); border:1px solid var(--card-line);
    padding:22px 56px; border-radius:24px;
    backdrop-filter:blur(6px);
  }
  .counter .num{
    font-size:clamp(46px,7vw,72px); font-weight:900;
    background:linear-gradient(135deg, var(--pink), var(--gold), var(--cyan));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    font-variant-numeric:tabular-nums;
    transition:transform .18s;
  }
  .counter .num.bump{ transform:scale(1.22); }
  .counter .lbl{ font-size:15px; color:var(--muted); letter-spacing:0.5px; }

  /* confetti burst on vote increment */
  .burst-particle{
    position:absolute; top:50%; left:50%;
    width:8px; height:8px; border-radius:2px;
    pointer-events:none;
    animation:burst 900ms ease-out forwards;
  }
  @keyframes burst{
    0%{ transform:translate(-50%,-50%) rotate(0deg) scale(1); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--bx)), calc(-50% + var(--by))) rotate(var(--br)) scale(0.3); opacity:0; }
  }

  /* ---- closed / results ---- */
  .trophy{ font-size:52px; margin-bottom:6px; filter:drop-shadow(0 0 24px rgba(255,201,60,0.5)); }
  .results-title{
    font-family:'Suez One', serif; font-weight:400;
    font-size:clamp(28px,4vw,44px);
    margin:0 0 6px;
  }
  .results-sub{ color:var(--muted); font-size:17px; margin-bottom:36px; }
  .result-block{ max-width:820px; margin:0 auto 30px; text-align:right; }
  .result-block h3{
    font-size:20px; font-weight:700; margin:0 0 16px;
    display:flex; align-items:center; gap:10px;
  }
  .rbar-row{ display:flex; align-items:center; gap:14px; margin-bottom:13px; }
  .rbar-label{ width:180px; flex-shrink:0; font-size:16px; font-weight:500; display:flex; align-items:center; gap:6px; }
  .rbar-track{ flex:1; height:26px; background:rgba(255,255,255,0.08); border-radius:20px; overflow:hidden; border:1px solid var(--card-line); }
  .rbar-fill{ height:100%; border-radius:20px; background:linear-gradient(90deg, var(--pink), var(--gold)); transition:width 1s cubic-bezier(.2,.9,.2,1); }
  .rbar-fill.leader{ background:linear-gradient(90deg, var(--gold), #fff3cf); box-shadow:0 0 18px rgba(255,201,60,0.6); }
  .rbar-pct{ width:60px; flex-shrink:0; text-align:left; font-weight:800; color:var(--gold); }

  .fade-in{ animation:fadeIn .5s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<div class="aurora"></div>
<div class="particle-field" id="particleField"></div>

<div class="stage" id="stage">
  <div class="idle-wrap">
    <div class="idle-ring">
      <span class="pulse-ring"></span>
      <span class="pulse-ring delay"></span>
      <span class="core">☎️</span>
    </div>
    <div class="idle-text">ממתינים לסקר הבא…</div>
  </div>
</div>

<script>
const API = '';
const stage = document.getElementById('stage');
let lastCount = null;
let lastStatus = null;

const PALETTE = ['#ff3d81', '#00e5c7', '#ffc93c', '#7ffff0', '#ff7ab0'];

// ---------- ambient rising particles (continuous festive motion) ----------
function initAmbientParticles(){
  const field = document.getElementById('particleField');
  const count = 26;
  for (let i = 0; i < count; i++){
    const p = document.createElement('div');
    p.className = 'drift-particle';
    const size = 4 + Math.random() * 8;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    p.style.animationDuration = (14 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 20) + 's';
    field.appendChild(p);
  }
}
initAmbientParticles();

// ---------- confetti burst when the vote counter increments ----------
function burstConfetti(container){
  for (let i = 0; i < 18; i++){
    const p = document.createElement('div');
    p.className = 'burst-particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 90;
    p.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--by', Math.sin(angle) * dist + 'px');
    p.style.setProperty('--br', (Math.random() * 360) + 'deg');
    p.style.background = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    container.appendChild(p);
    setTimeout(() => p.remove(), 950);
  }
}

async function poll(){
  try{
    const res = await fetch(API + '/display/status');
    const data = await res.json();
    render(data);
  }catch(err){ /* keep last rendered state on transient network errors */ }
}

function render(data){
  if (data.status === 'idle'){
    if (lastStatus !== 'idle'){
      stage.innerHTML = `
        <div class="idle-wrap fade-in">
          <div class="idle-ring">
            <span class="pulse-ring"></span>
            <span class="pulse-ring delay"></span>
            <span class="core">☎️</span>
          </div>
          <div class="idle-text">ממתינים לסקר הבא…</div>
        </div>
      `;
    }
    lastStatus = 'idle'; lastCount = null;
    return;
  }

  if (data.status === 'active'){
    const bump = lastCount !== null && data.response_count !== lastCount;
    const optionsHtml = (data.options || []).map(o => `
      <div class="option">
        <span class="digit">${o.digit}</span>
        <span>${escapeHtml(o.text)}</span>
      </div>
    `).join('');

    stage.innerHTML = `
      <div class="eyebrow fade-in"><span class="live-dot"></span> משדרים חי · ${escapeHtml(data.survey_title || '')}</div>
      <h1 class="question fade-in">${escapeHtml(data.question || '')}</h1>
      <div class="options">${optionsHtml}</div>
      <div class="counter-wrap">
        <div class="counter" id="counterBox">
          <span class="num ${bump ? 'bump' : ''}" id="countNum">${data.response_count}</span>
          <span class="lbl">משיבים עד כה</span>
        </div>
      </div>
    `;
    if (bump){
      const box = document.getElementById('counterBox');
      burstConfetti(box);
      setTimeout(() => {
        const el = document.getElementById('countNum');
        if (el) el.classList.remove('bump');
      }, 220);
    }
    lastCount = data.response_count;
    lastStatus = 'active';
    return;
  }

  if (data.status === 'closed'){
    if (lastStatus !== 'closed'){
      const blocks = (data.results || []).map(q => {
        const maxCount = Math.max(0, ...q.options.map(o => o.count));
        return `
          <div class="result-block">
            <h3>${escapeHtml(q.question)}</h3>
            ${q.options.map(o => {
              const isLeader = maxCount > 0 && o.count === maxCount;
              return `
                <div class="rbar-row">
                  <div class="rbar-label">${isLeader ? '👑 ' : ''}${escapeHtml(o.text)}</div>
                  <div class="rbar-track"><div class="rbar-fill ${isLeader ? 'leader' : ''}" style="width:${o.percent}%"></div></div>
                  <div class="rbar-pct">${o.percent}%</div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');

      stage.innerHTML = `
        <div class="trophy fade-in">🏆</div>
        <div class="results-title fade-in">התוצאות הסופיות</div>
        <div class="results-sub">${escapeHtml(data.survey_title || '')}</div>
        ${blocks}
      `;
    }
    lastStatus = 'closed';
    return;
  }
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

poll();
setInterval(poll, 2000);
</script>

</body>
</html>
